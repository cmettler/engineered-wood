name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    # windows-latest is needed for the net472 test pass against the
    # netstandard2.0 build of the libraries.
    runs-on: windows-latest

    permissions:
      contents: write   # required for creating GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Derive version from tag
        id: version
        shell: pwsh
        run: |
          # Tag v0.1.0 -> version 0.1.0. This overrides the default <Version>
          # in src/Directory.Build.props, so the tag is the single source of
          # truth for a release's version — all 15 packages share it.
          $version = $env:GITHUB_REF -replace '^refs/tags/v', ''
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Releasing version $version"

      - name: Restore
        run: dotnet restore engineered-wood.slnx

      - name: Build
        run: dotnet build engineered-wood.slnx --no-restore --configuration Release -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test engineered-wood.slnx --no-build --configuration Release

      - name: Pack
        # Produces the 15 src/ libraries at the tag version (test/benchmark
        # projects opt out of packing via test/Directory.Build.props).
        run: dotnet pack engineered-wood.slnx --no-build --configuration Release -p:Version=${{ steps.version.outputs.version }} --output artifacts

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: pwsh
        run: |
          if (-not $env:NUGET_API_KEY) {
            Write-Error "NUGET_API_KEY secret is not configured."
            exit 1
          }
          # `dotnet nuget push` does not reliably expand a wildcard path, so
          # enumerate the packages and push each explicitly. The matching
          # .snupkg symbol package next to each .nupkg is pushed automatically.
          $pkgs = Get-ChildItem -Path artifacts -Filter *.nupkg
          if (-not $pkgs) {
            Write-Error "No .nupkg files found in artifacts/."
            exit 1
          }
          foreach ($pkg in $pkgs) {
            Write-Host "Pushing $($pkg.Name)"
            dotnet nuget push $pkg.FullName --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $assets = @(Get-ChildItem artifacts/*.nupkg, artifacts/*.snupkg | ForEach-Object { $_.FullName })
          gh release create "${{ github.ref_name }}" @assets --generate-notes
